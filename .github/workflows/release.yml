# タグ push (v*) で macOS と Windows の Tauri アプリをビルドし、
# Release に成果物を添付する。
name: Release

on:
  push:
    tags: ["v*"]
  # 手動でも実行可能にする（既存タグに対して artifact 追加用）
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            # --target 指定すると target/<triple>/release/ に出力される
            artifact_glob: "packages/menubar/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_glob: "packages/menubar/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: packages/menubar/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/menubar/src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: packages/menubar

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }}
        working-directory: packages/menubar

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: true
