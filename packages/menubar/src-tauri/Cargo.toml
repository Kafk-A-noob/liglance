[package]
name = "liglance"
version = "0.1.0"
description = "LiGlance — Linear issues Glance, menubar app for macOS"
authors = ["Kafk-A-noob"]
license = "MIT"
repository = "https://github.com/Kafk-A-noob/liglance"
edition = "2021"

[lib]
name = "liglance_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "macos-private-api"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# 非同期ランタイム（HTTP リクエスト用）
tokio = { version = "1", features = ["full"] }
# HTTP クライアント
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
# トレイアイコン用に埋め込んだ PNG をデコードする
image = { version = "0.25", default-features = false, features = ["png"] }

# macOS 以外は Keychain アクセスに keyring crate を使う
# (macOS は dev ビルドの ACL 問題回避のため shell 経由の security CLI を使う)
# Windows: windows-credential フィーチャーを明示しないと資格情報マネージャーが使われず
# メモリ上の mock ストアにフォールバックしてしまう（再起動で消える）
[target.'cfg(target_os = "windows")'.dependencies]
keyring = { version = "3", features = ["windows-credential"] }

[target.'cfg(all(not(target_os = "macos"), not(target_os = "windows")))'.dependencies]
keyring = "3"
